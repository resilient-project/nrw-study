# yaml-language-server: $schema=./schema.default.json

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#version
version: v2026.02.0

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#run
run:
  prefix: "nrw"
  name:
  - test-offshore-only
  - test-offshore-onshore
  scenarios:
    enable: true
    file: config/scenarios.nrw.yaml
  disable_progressbar: false
  shared_resources:
    policy: false
    exclude: []
  use_shadow_directory: false


# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#foresight
foresight: myopic

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#scenario
scenario:
  clusters:
  - adm
  opts:
  - ""
  sector_opts:
  - ""
  planning_horizons:
  - 2035
  - 2040
  - 2045

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#countries
countries:
- AT
- BE
- CH
- CZ
- DE
- DK
- FR
- GB
- LU
- NL
- "NO"
- PL
- SE
- ES
- IT

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#electricity
electricity:
  renewable_carriers:
  - solar
  - onwind
  - "offwind-ac"
  - "offwind-dc"
  - hydro

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#transmission
transmission:
  hydrogen:
    enable: true
    gabriel_filter_min_degree: 0
    max_offshore_haversine_distance: 300
    length_factor: 1.25
    cost_factor: 1
    retrofit:
      enable: false
      capacity_per_ch4: 0.6
    efficiency:
      enable: true
      efficiency_per_1000km: 1.0
      compression_per_1000km: 0.018
  carbon_dioxide:
    enable: true
    gabriel_filter_min_degree: 0
    max_offshore_haversine_distance: 300
    length_factor: 1.25
    cost_factor: 1
    projects:
      enable: true
      extendable: false

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#sector
sector:
  transport: true
  heating: true
  biomass: true
  industry: true
  shipping: true
  aviation: true
  agriculture: true
  fossil_fuels: true
  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: true
    min_size: 1
    max_size: 25
    years_of_storage: 25
  co2_sequestration_potential:
    2020: 0
    2025: 0
    2030: 40
    2035: 100
    2040: 180
    2045: 250
    2050: 250
  co2_sequestration_cost: 30
  co2_sequestration_lifetime: 50

# docs in https://pypsa-eur.readthedocs.io/en/latest/configuration.html#clustering
clustering:
  mode: administrative
  administrative:
    level: 0
    countries:
      BE: 1
      DE: 2
      NL: 1
      DEA: 3

solving:
  options:
    skip_iterations: false # set to true skips iterations and disables post_discretization
    min_iterations: 1
    max_iterations: 1
    post_discretization:
      enable: true
      carriers:
      - CO2 pipeline
      link_unit_size:
        CO2 pipeline: 1328
      link_threshold:
        CO2 pipeline: 0.3
      fractional_last_unit_size: false
